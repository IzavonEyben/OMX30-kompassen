name: Update OMX30 Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * 1-5"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest OMX30 data
        run: node scripts/update-omx30-data.mjs

      - name: Commit and push if data changed
        run: |
          if git diff --quiet -- data/omx30.json; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/omx30.json
          git commit -m "chore: update omx30 data"
          git push
